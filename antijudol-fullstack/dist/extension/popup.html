<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>ANTI-JUDOL</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      width: 350px;
      font-family: system-ui, -apple-system, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
    }
    
    .container {
      padding: 20px;
    }
    
    .header {
      text-align: center;
      margin-bottom: 20px;
    }
    
    .header h1 {
      font-size: 24px;
      margin-bottom: 5px;
    }
    
    .header p {
      font-size: 12px;
      opacity: 0.9;
    }
    
    .shield-icon {
      font-size: 48px;
      margin-bottom: 10px;
    }
    
    .stats {
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(10px);
      border-radius: 12px;
      padding: 15px;
      margin-bottom: 15px;
    }
    
    .stat-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 0;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    }
    
    .stat-row:last-child {
      border-bottom: none;
    }
    
    .stat-label {
      font-size: 14px;
      opacity: 0.9;
    }
    
    .stat-value {
      font-size: 20px;
      font-weight: bold;
    }
    
    .status {
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(10px);
      border-radius: 12px;
      padding: 15px;
      text-align: center;
      margin-bottom: 15px;
    }
    
    .status-indicator {
      display: inline-block;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: #4ade80;
      margin-right: 8px;
      animation: pulse 2s infinite;
    }
    
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }
    
    .device-id {
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(10px);
      border-radius: 8px;
      padding: 10px;
      font-size: 11px;
      font-family: monospace;
      text-align: center;
      margin-bottom: 15px;
      word-break: break-all;
    }
    
    .footer {
      text-align: center;
      font-size: 11px;
      opacity: 0.8;
      margin-top: 15px;
    }
    
    button {
      width: 100%;
      padding: 12px;
      background: rgba(255, 255, 255, 0.2);
      border: 1px solid rgba(255, 255, 255, 0.3);
      border-radius: 8px;
      color: white;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
    }
    
    button:hover {
      background: rgba(255, 255, 255, 0.3);
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="shield-icon">🛡️</div>
      <h1>ANTI-JUDOL</h1>
      <p>Campus Gambling Protection</p>
    </div>
    
    <div class="status">
      <span class="status-indicator"></span>
      <span>Protection Active</span>
    </div>
    
    <div class="stats">
      <div class="stat-row">
        <span class="stat-label">Sites Blocked Today</span>
        <span class="stat-value" id="sitesBlocked">0</span>
      </div>
      <div class="stat-row">
        <span class="stat-label">Ads Blocked Today</span>
        <span class="stat-value" id="adsBlocked">0</span>
      </div>
    </div>
    
    <div class="device-id">
      Device ID: <span id="deviceId">Loading...</span>
    </div>
    
    <button id="refreshBtn">Refresh Statistics</button>
    
    <div class="footer">
      Protected by ANTI-JUDOL System<br>
      Version 1.0.0
    </div>
  </div>
  
  <script src="popup.js"></script>
</body>
</html>
